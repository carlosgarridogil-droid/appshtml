<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Lecturas 1º Primaria</title>
    <style>
        /* --- FUENTES --- */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Comic+Neue:wght@400;700&display=swap');

        :root {
            --app-bg: #E0F7FA;
            --text-dark: #37474F;
            --card-shadow: rgba(0,0,0,0.15);
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--app-bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255,255,255,0.4) 10%, transparent 11%),
                radial-gradient(circle at 90% 80%, rgba(255,255,255,0.4) 10%, transparent 11%);
            background-size: 60px 60px;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            min-height: 100vh;
        }

        /* --- VISTA MENÚ --- */
        #menu-view {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
            animation: fadeIn 0.8s;
        }

        header { margin-bottom: 40px; }

        h1 {
            font-size: 3.5rem;
            color: #FF6F00;
            margin: 0;
            text-shadow: 2px 2px 0 #FFD54F;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 1.8rem;
            color: #00838F;
            background: #B2EBF2;
            padding: 8px 30px;
            border-radius: 50px;
            display: inline-block;
            margin-top: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        .menu-credits {
            font-family: 'Comic Neue', cursive;
            font-size: 1.1rem;
            color: #006064;
            margin-top: 20px;
            font-weight: bold;
            border-top: 2px dashed #80DEEA;
            display: inline-block;
            padding-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            box-shadow: 0 10px 0 var(--card-shadow);
            transition: all 0.2s;
            border: 4px solid transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .card:hover { transform: translateY(-8px); box-shadow: 0 18px 0 var(--card-shadow); }
        .card:active { transform: translateY(0); box-shadow: 0 4px 0 var(--card-shadow); }

        .card-num {
            position: absolute; top: 15px; left: 15px;
            width: 35px; height: 35px;
            background: #333; color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.1rem;
        }

        .card-icon { font-size: 4.5rem; margin: 15px 0; transition: transform 0.3s; }
        .card:hover .card-icon { transform: scale(1.1) rotate(5deg); }

        .card-title {
            font-family: 'Comic Neue', cursive;
            font-size: 1.4rem;
            font-weight: bold;
            line-height: 1.2;
            margin-top: 5px;
        }

        /* --- VISTA JUEGO --- */
        #game-view {
            display: none;
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 35px;
            border: 8px solid #333; /* Se cambia dinámicamente */
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            min-height: 750px;
        }

        .screen {
            padding: 40px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 100%;
            animation: slideUp 0.5s ease-out;
            justify-content: center; /* Centrar contenido verticalmente */
        }
        
        .screen.active { display: flex; }

        .btn-home {
            position: absolute; top: 25px; left: 25px;
            background: #ECEFF1; border: none;
            padding: 10px 20px; border-radius: 30px;
            cursor: pointer; color: #546E7A; font-weight: bold;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 4px 0 #CFD8DC;
            z-index: 100;
        }
        .btn-home:active { transform: translateY(2px); box-shadow: none; }

        /* PANTALLA 1: PORTADA ORIGINAL */
        .badge-curso {
            background: #333; /* Se cambia */
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 40px;
            margin-bottom: 20px;
            display: inline-block;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .hero-title { font-size: 3.5rem; color: var(--theme-color); margin-bottom: 10px; line-height: 1.1; }
        
        .author-text {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            color: white;
            background: #333; /* Se cambia */
            padding: 8px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: inline-block;
            border: 2px solid rgba(0,0,0,0.1);
        }

        .hero-icons-container {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin: 20px 0;
        }
        .hero-icon {
            font-size: 6rem;
            animation: bounce 3s infinite ease-in-out;
            filter: drop-shadow(0 8px 0 rgba(0,0,0,0.15));
        }
        .hero-icon:nth-child(2) { animation-delay: 0.2s; }
        .hero-icon:nth-child(3) { animation-delay: 0.4s; }

        .motivational-text {
            font-size: 1.5rem;
            font-family: 'Comic Neue', cursive;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.4;
            max-width: 80%;
        }

        /* PANTALLA 2: LECTURA */
        .reading-box {
            background: #FAFAFA;
            padding: 30px;
            border-radius: 20px;
            border: 3px dashed #B0BEC5; /* Se cambia dinámicamente */
            text-align: left;
            font-family: 'Comic Neue', cursive;
            font-size: 1.6rem;
            line-height: 1.7;
            width: 90%;
            margin: 20px 0;
            white-space: pre-line;
            max-height: 400px;
            overflow-y: auto;
            color: #263238;
        }

        /* PANTALLA 3: PREGUNTAS */
        .progress-bar-container {
            width: 80%; height: 15px; background: #eee;
            border-radius: 10px; margin-bottom: 30px; overflow: hidden; margin-top: 30px;
        }
        .progress-fill { height: 100%; background: #66BB6A; width: 0%; transition: 0.3s; }
        
        .quiz-question { font-size: 2rem; color: #37474F; margin-bottom: 30px; font-weight: bold; }
        
        .options-grid { display: grid; gap: 15px; width: 90%; }
        .opt-btn {
            background: white; border: 3px solid #ECEFF1;
            padding: 20px; border-radius: 15px;
            font-size: 1.5rem; cursor: pointer;
            font-family: 'Comic Neue', cursive; font-weight: bold;
            color: #455A64; transition: 0.1s;
        }
        .opt-btn:hover { background: #F5F5F5; transform: scale(1.02); }
        .opt-btn.correct { background: #DCEDC8; border-color: #76FF03; color: #1B5E20; }
        .opt-btn.wrong { background: #FFCDD2; border-color: #FF1744; color: #B71C1C; }

        /* PANTALLA 4: FINAL */
        .score-box {
            background: #FFF9C4; padding: 20px 60px;
            border-radius: 20px; font-size: 3.5rem; font-weight: bold;
            color: #F57F17; border: 4px solid #FBC02D;
            margin: 30px 0;
        }

        /* BOTONES */
        .btn {
            background: #333; /* Se cambia dinámicamente */
            color: white; border: none;
            padding: 15px 40px; font-size: 1.6rem;
            border-radius: 50px; cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            box-shadow: 0 8px 0 rgba(0,0,0,0.3);
            margin: 10px; display: inline-flex; align-items: center; gap: 10px;
            transition: transform 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
        
        .btn-audio { background: #FF9800 !important; box-shadow: 0 8px 0 #E65100 !important; }
        .btn-audio:active { box-shadow: 0 2px 0 #E65100 !important; }
        
        .btn-stop { background: #F44336 !important; box-shadow: 0 8px 0 #B71C1C !important; }
        .btn-stop:active { box-shadow: 0 2px 0 #B71C1C !important; }

        /* ANIMACIONES */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes bounce { 
            0% { transform: rotate(5deg); }
            50% { transform: rotate(-5deg); }
            100% { transform: rotate(5deg); }
        }

        #confetti-canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 50; }

    </style>
</head>
<body>

    <div id="menu-view">
        <header>
            <h1>📚 Taller de Lecturas</h1>
            <div class="subtitle">1º Primaria</div>
            <br>
            <div class="menu-credits">Elaborado por Carlos Garrido - IA Gemini - Basado en Santillana</div>
        </header>
        <div class="grid" id="grid-container"></div>
    </div>

    <div id="game-view">
        <canvas id="confetti-canvas"></canvas>
        <button class="btn-home" onclick="showMenu()">🏠 MENÚ</button>

        <div id="screen-intro" class="screen">
            <div id="badge-curso" class="badge-curso">1º PRIMARIA</div>
            
            <h1 class="hero-title" id="intro-title">Título</h1>
            
            <div class="author-text">Carlos Garrido - IA Gemini</div>
            
            <div class="hero-icons-container" id="intro-icons"></div>
            
            <p class="motivational-text" id="intro-desc">Descripción motivadora...</p>
            
            <button class="btn" id="btn-start" onclick="nextScreen('screen-reading')">📖 EMPEZAR</button>
        </div>

        <div id="screen-reading" class="screen">
            <h2 style="color:#555; margin-bottom:10px;">Vamos a leer</h2>
            <div class="reading-box" id="story-text"></div>
            <div>
                <button class="btn btn-audio" onclick="playAudio()">🔊 Escuchar</button>
                <button class="btn btn-stop" onclick="stopAudio()">⏹</button>
            </div>
            <br>
            <button class="btn" id="btn-quiz" onclick="startQuiz()">PREGUNTAS ➡️</button>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="progress-bar-container"><div class="progress-fill" id="p-bar"></div></div>
            <div class="quiz-question" id="q-text">Pregunta</div>
            <div class="options-grid" id="opt-container"></div>
            <div id="feedback" style="font-weight:bold; font-size:1.5rem; height:40px; margin-top:20px;"></div>
        </div>

        <div id="screen-end" class="screen">
            <h1 style="color:#333;">¡Excelente!</h1>
            <div style="font-size:6rem; margin:20px;">🏆</div>
            <p style="font-size:1.6rem; color:#555;">¡Eres un gran lector!</p>
            <div class="score-box" id="final-score">5 / 5</div>
            <button class="btn" id="btn-menu-back" onclick="showMenu()">🏠 VOLVER</button>
            <button class="btn btn-audio" onclick="nextScreen('screen-reading')">🔄 REPETIR</button>
        </div>
    </div>

        /* --- LÓGICA DE LA APP --- */
        const menuView = document.getElementById('menu-view');
        const gameView = document.getElementById('game-view');
        const grid = document.getElementById('grid-container');
        
        let currentStory = null;
        let qIndex = 0;
        let score = 0;

        // 1. GENERAR MENÚ
        DB.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.borderColor = item.color;
            card.innerHTML = `
                <div class="card-num" style="background:${item.color}">${item.id}</div>
                <div class="card-icon">${item.icons[0]}</div>
                <div class="card-title" style="color:${item.color}">${item.title}</div>
            `;
            card.onclick = () => launchStory(item);
            grid.appendChild(card);
        });

        // 2. LANZAR HISTORIA
        function launchStory(data) {
            currentStory = data;
            
            // Diseño temático
            gameView.style.borderColor = data.color;
            document.querySelector('#screen-reading .reading-box').style.borderColor = data.color;
            
            // Portada
            document.getElementById('intro-title').innerText = data.title;
            document.getElementById('intro-title').style.color = data.color;
            document.getElementById('intro-desc').innerText = data.desc;
            document.getElementById('badge-curso').style.backgroundColor = data.color;
            document.querySelector('.author-text').style.borderColor = data.color;
            document.querySelector('.author-text').style.backgroundColor = data.color;

            // Iconos animados
            const iconsDiv = document.getElementById('intro-icons');
            iconsDiv.innerHTML = '';
            data.icons.forEach(icon => {
                let i = document.createElement('div');
                i.className = 'hero-icon';
                i.innerText = icon;
                iconsDiv.appendChild(i);
            });

            // Botones
            const btns = document.querySelectorAll('#btn-start, #btn-quiz, #btn-menu-back');
            btns.forEach(b => b.style.backgroundColor = data.color);

            // Texto
            document.getElementById('story-text').innerText = data.text;

            // Navegación
            menuView.style.display = 'none';
            gameView.style.display = 'block';
            nextScreen('screen-intro');
        }

        function nextScreen(id) {
            stopAudio();
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function showMenu() {
            stopAudio();
            gameView.style.display = 'none';
            menuView.style.display = 'block';
        }

        // 3. AUDIO
        function playAudio() {
            stopAudio();
            const utter = new SpeechSynthesisUtterance(currentStory.text);
            utter.lang = 'es-ES';
            utter.rate = 0.9;
            window.speechSynthesis.speak(utter);
        }

        function stopAudio() {
            window.speechSynthesis.cancel();
        }

        // 4. JUEGO
        function startQuiz() {
            stopAudio();
            qIndex = 0; score = 0;
            nextScreen('screen-quiz');
            loadQuestion();
        }

        function loadQuestion() {
            const q = currentStory.quiz[qIndex];
            document.getElementById('q-text').innerText = (qIndex + 1) + ". " + q.q;
            document.getElementById('feedback').innerText = "";
            document.getElementById('p-bar').style.width = ((qIndex / 5) * 100) + "%";
            
            const cont = document.getElementById('opt-container');
            cont.innerHTML = '';
            
            q.o.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(idx, btn);
                cont.appendChild(btn);
            });
        }

        function checkAnswer(idx, btn) {
            if(document.getElementById('feedback').innerText !== "") return;
            const q = currentStory.quiz[qIndex];
            
            if(idx === q.c) {
                btn.classList.add('correct');
                score++;
                document.getElementById('feedback').innerText = "¡SÍ! ¡MUY BIEN! 🎉";
                document.getElementById('feedback').style.color = "#2E7D32";
                playTone(true);
            } else {
                btn.classList.add('wrong');
                document.querySelectorAll('.opt-btn')[q.c].classList.add('correct');
                document.getElementById('feedback').innerText = "¡OH NO! 😅";
                document.getElementById('feedback').style.color = "#C62828";
                playTone(false);
            }
            
            setTimeout(() => {
                qIndex++;
                if(qIndex < 5) loadQuestion();
                else showEnd();
            }, 2000);
        }

        function showEnd() {
            document.getElementById('p-bar').style.width = "100%";
            document.getElementById('final-score').innerText = score + " / 5";
            nextScreen('screen-end');
            if(score === 5) {
                startConfetti();
                playTone(true);
            }
        }

        // 5. EXTRAS
        function playTone(win) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.connect(g); g.connect(ctx.destination);
                osc.type = win ? 'sine' : 'sawtooth';
                osc.frequency.setValueAtTime(win ? 600 : 150, ctx.currentTime);
                g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } catch(e) {}
        }

        function startConfetti() {
            const c = document.getElementById('confetti-canvas');
            const ctx = c.getContext('2d');
            c.width = document.getElementById('game-view').offsetWidth;
            c.height = document.getElementById('game-view').offsetHeight;
            const p = [];
            for(let i=0; i<60; i++) p.push({
                x: Math.random()*c.width, y: Math.random()*c.height - c.height,
                c: [currentStory.color, '#FFD700', '#FFF'][Math.floor(Math.random()*3)],
                s: Math.random()*5+5, v: Math.random()*3+2
            });
            function draw() {
                ctx.clearRect(0,0,c.width,c.height);
                p.forEach(k => {
                    k.y += k.v; if(k.y > c.height) k.y = -10;
                    ctx.fillStyle = k.c; ctx.beginPath(); ctx.arc(k.x, k.y, k.s, 0, Math.PI*2); ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        }
    </script>
