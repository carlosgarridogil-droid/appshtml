
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÓRBITA NUMÉRICA v1.1 - Cálculo Mental</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-page: #050a14; 
            --game-main: #00D4FF; 
            --correct: #00FFA3;
            --wrong: #FF0055; 
            --gold: #FFD700; 
            --neon: #9D50BB;
            --panel-bg: rgba(5, 10, 25, 0.98);
        }

        body {
            font-family: 'Quicksand', sans-serif; background: var(--bg-page);
            margin: 0; display: flex; justify-content: center;
            align-items: center; min-height: 100vh; overflow: hidden; color: white;
        }

        #star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at center, #0a1931 0%, #050a14 100%); }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.5; animation: twinkle var(--d) infinite alternate; }
        @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.8; } }

        .hud-top {
            position: fixed; top: 0; width: 100%; height: 90px;
            display: flex; justify-content: center; align-items: center; gap: 40px;
            z-index: 100; background: linear-gradient(to bottom, rgba(0, 212, 255, 0.1), transparent);
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            backdrop-filter: blur(8px);
        }
        .stat-box { text-align: center; font-family: 'Luckiest Guy'; }
        .stat-value { font-size: 3rem; line-height: 1; filter: drop-shadow(0 0 8px currentColor); }
        .color-hit { color: var(--correct); }
        .color-miss { color: var(--wrong); }

        .game-card { 
            background: var(--panel-bg); 
            border: 2px solid var(--game-main); 
            border-radius: 40px; width: 90%; max-width: 800px; padding: 40px; 
            text-align: center; position: relative;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
        }

        .q-text { 
            font-family: 'Luckiest Guy'; font-size: 8rem; margin: 10px 0; 
            text-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
            letter-spacing: 5px;
        }

        #user-ans { 
            background: rgba(0, 0, 0, 0.6); border: 3px solid var(--game-main); 
            border-radius: 25px; color: var(--gold); font-family: 'Luckiest Guy'; 
            font-size: 5.5rem; width: 250px; text-align: center; outline: none;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); transition: 0.3s;
        }

        .ans-error { border-color: var(--wrong) !important; box-shadow: 0 0 30px var(--wrong) !important; }
        #correct-helper { font-family: 'Luckiest Guy'; font-size: 2.5rem; color: var(--correct); margin-top: 15px; height: 40px; }

        /* REPORTE ESTILO IMAGEN SOLICITADA */
        #report-card { background: white; color: #1a1a1a; padding: 40px; border-radius: 20px; text-align: left; border: 10px solid var(--game-main); }
        
        /* Contenedor Calificación Estilo Imagen */
        .grade-container {
            border: 6px dashed var(--gold);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            margin: 25px 0;
            font-family: 'Luckiest Guy';
        }
        .grade-label { font-size: 2.5rem; color: var(--gold); margin-bottom: 5px; display: block; }
        .grade-value { font-size: 4rem; display: block; line-height: 1; }
        .grade-number { font-size: 2.5rem; display: block; margin-top: 5px; }

        .error-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .error-table th { background: #f0f4f8; border: 1px solid #d1d9e6; padding: 12px; }
        .error-table td { border: 1px solid #d1d9e6; padding: 12px; text-align: center; font-weight: bold; }

        .btn-ui { padding: 18px 35px; border-radius: 15px; border: none; font-family: 'Luckiest Guy'; font-size: 1.2rem; cursor: pointer; transition: 0.3s; margin: 10px; text-transform: uppercase; }
        .btn-main { background: var(--game-main); color: #020408; box-shadow: 0 0 20px var(--game-main); }
        .btn-pdf { background: #ff4757; color: white; }
        .btn-ui:hover { transform: translateY(-5px) scale(1.02); filter: brightness(1.1); }

        .hidden { display: none !important; }
        .neon-text { color: var(--game-main); text-shadow: 0 0 10px var(--game-main); font-weight: bold; }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <div id="game-hud" class="hud-top hidden">
        <div class="stat-box"><div class="stat-value color-hit" id="h-hits">0</div><div style="font-size:0.7rem;">CÁLCULOS OK</div></div>
        <div style="font-family:'Luckiest Guy'; color:var(--game-main); font-size:1.8rem;">RADIO CONTROL</div>
        <div class="stat-box"><div class="stat-value color-miss" id="h-errors">0</div><div style="font-size:0.7rem;">DESVÍOS</div></div>
    </div>

    <div class="game-card">
        <!-- INICIO -->
        <div id="screen-start">
            <div style="font-size:110px; margin-bottom: 10px;">🛸</div>
            <h1 style="font-family:'Luckiest Guy'; font-size:3.8rem; color:var(--gold); margin:0;">ÓRBITA NUMÉRICA</h1>
            <p class="neon-text">ENTRENAMIENTO DE CÁLCULO MENTAL RELATIVISTA</p>
            
            <input type="text" id="player-name" placeholder="IDENTIFICACIÓN DEL PILOTO..." style="background:rgba(255,255,255,0.05); border:2px solid var(--game-main); padding:20px; border-radius:20px; color:white; width:80%; text-align:center; font-size:1.5rem; margin: 30px 0; outline:none;">
            <br>
            <button class="btn-ui btn-main" onclick="initEngine()">ACTIVAR NÚCLEO</button>
        </div>

        <!-- JUEGO -->
        <div id="screen-game" class="hidden">
            <div id="display-progress" style="font-size:1.3rem; color:var(--game-main); font-weight:bold;">OPERACIÓN 1 / 10</div>
            <div class="q-text" id="display-q">0 + 0</div>
            <input type="number" id="user-ans" autocomplete="off">
            <div id="correct-helper"></div>
        </div>

        <!-- RESULTADOS -->
        <div id="screen-results" class="hidden">
            <div id="pdf-content">
                <div id="report-card">
                    <div style="display:flex; justify-content:space-between; border-bottom:3px solid #f0f0f0; padding-bottom:15px; align-items:center;">
                        <div>
                            <strong style="color:var(--game-main); font-size:1.5rem;">REGISTRO DE TELEMETRÍA</strong><br>
                            <span>Evaluación de Agilidad Mental</span>
                        </div>
                        <span id="rep-date" style="font-weight:bold;"></span>
                    </div>
                    
                    <!-- RECUADRO ESTILO IMAGEN SOLICITADA -->
                    <div class="grade-container">
                        <span class="grade-label">PILOTO</span>
                        <span id="rep-name-large" style="font-size: 2rem; color: #333; margin-bottom: 10px; display: block;"></span>
                        <span id="rep-grade-text" class="grade-value"></span>
                        <span id="rep-grade-number" class="grade-number"></span>
                    </div>

                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:30px; margin-bottom:20px; font-size: 0.9rem;">
                        <div>
                            <strong>DATOS DE MISIÓN:</strong><br>
                            Precisión: <span class="color-hit" id="rep-hits"></span> / 10<br>
                            Fallos: <span class="color-miss" id="rep-errors"></span><br>
                            Ratio: <span id="rep-perc" style="font-weight:bold;"></span>
                        </div>
                        <div>
                            <strong>ANÁLISIS DE IA:</strong><br>
                            <span id="rep-obs" style="font-style:italic;"></span>
                        </div>
                    </div>

                    <table class="error-table" id="table-results">
                        <thead>
                            <tr>
                                <th>Cálculo</th>
                                <th>Tu Respuesta</th>
                                <th>Resultado Real</th>
                            </tr>
                        </thead>
                        <tbody id="error-body"></tbody>
                    </table>
                </div>
            </div>
            <div style="margin-top:30px;">
                <button class="btn-ui btn-pdf" onclick="exportPDF()">DESCARGAR REPORTE PDF</button>
                <button class="btn-ui btn-main" onclick="location.reload()">NUEVA MISIÓN</button>
            </div>
        </div>
    </div>

    <script>
        let hits = 0, errors = 0, currentIdx = 0;
        let questions = [];
        let logs = [];

        // Crear estrellas
        const field = document.getElementById('star-field');
        for(let i=0; i<100; i++) {
            let s = document.createElement('div'); s.className = 'star';
            s.style.width = s.style.height = Math.random()*3+'px';
            s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
            s.style.setProperty('--d', Math.random()*3+1+'s');
            field.appendChild(s);
        }

        function initEngine() {
            if(!document.getElementById('player-name').value) {
                alert("Por favor, identifícate, Piloto.");
                return;
            }
            document.getElementById('screen-start').classList.add('hidden');
            document.getElementById('game-hud').classList.remove('hidden');
            document.getElementById('screen-game').classList.remove('hidden');
            generateMission();
            nextQuestion();
        }

        function generateMission() {
            questions = [];
            for(let i=0; i<10; i++) {
                if(i % 2 === 0) {
                    let n1 = Math.floor(Math.random() * 90) + 10;
                    let n2 = Math.floor(Math.random() * 9) + 1;
                    questions.push({ q: `${n1} - ${n2}`, a: n1 - n2 });
                } else {
                    let n1 = Math.floor(Math.random() * 90) + 10;
                    let n2 = Math.floor(Math.random() * 9) + 1;
                    questions.push({ q: `${n1} + ${n2}`, a: n1 + n2 });
                }
            }
        }

        function nextQuestion() {
            if(currentIdx >= 10) return finishGame();
            const q = questions[currentIdx];
            document.getElementById('display-progress').innerText = `OPERACIÓN ${currentIdx + 1} / 10`;
            document.getElementById('display-q').innerText = q.q;
            const input = document.getElementById('user-ans');
            input.value = ""; input.className = ""; input.disabled = false; input.focus();
            document.getElementById('correct-helper').innerText = "";
        }

        document.getElementById('user-ans').addEventListener('keypress', function(e) {
            if(e.key === 'Enter' && this.value !== "") process(parseInt(this.value));
        });

        function process(val) {
            const q = questions[currentIdx];
            const isCorrect = val === q.a;
            const input = document.getElementById('user-ans');
            input.disabled = true;
            logs.push({ q: q.q, user: val, correct: q.a, ok: isCorrect });

            if(isCorrect) {
                hits++;
                confetti({ particleCount: 40, spread: 60, colors: ['#00D4FF', '#00FFA3'] });
                setTimeout(() => { currentIdx++; nextQuestion(); updateHUD(); }, 600);
            } else {
                errors++;
                input.classList.add('ans-error');
                document.getElementById('correct-helper').innerText = `SISTEMA: ERA ${q.a}`;
                setTimeout(() => { currentIdx++; nextQuestion(); updateHUD(); }, 1600);
            }
        }

        function updateHUD() {
            document.getElementById('h-hits').innerText = hits;
            document.getElementById('h-errors').innerText = errors;
        }

        function finishGame() {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('game-hud').classList.add('hidden');
            document.getElementById('screen-results').classList.remove('hidden');

            const scoreNum = hits; // Al ser 10 preguntas, aciertos = nota
            const scorePerc = (hits / 10) * 100;
            const name = document.getElementById('player-name').value.toUpperCase();
            document.getElementById('rep-name-large').innerText = name;
            document.getElementById('rep-date').innerText = new Date().toLocaleDateString();
            document.getElementById('rep-hits').innerText = hits;
            document.getElementById('rep-errors').innerText = errors;
            document.getElementById('rep-perc').innerText = scorePerc + "%";
            document.getElementById('rep-grade-number').innerText = `NOTA: ${scoreNum}`;

            let grade = "", color = "", obs = "";
            // Escala solicitada: Sobresaliente (9-10), Notable (7-8), Bien (6), Suficiente (5), Insuficiente (<5)
            if(scoreNum >= 9) { grade="SOBRESALIENTE"; color="#00FFA3"; obs="Capacidad de procesamiento excepcional."; }
            else if(scoreNum >= 7) { grade="NOTABLE"; color="#00D4FF"; obs="Excelente control de los sistemas numéricos."; }
            else if(scoreNum === 6) { grade="BIEN"; color="#FFD700"; obs="Vuelo estable. Sigue practicando."; }
            else if(scoreNum === 5) { grade="SUFICIENTE"; color="#FF8C00"; obs="Nivel básico alcanzado. Requiere refuerzo."; }
            else { grade="INSUFICIENTE"; color="#FF0055"; obs="Misión fallida. Regresa al simulador de base."; }

            const gradeText = document.getElementById('rep-grade-text');
            gradeText.innerText = grade;
            gradeText.style.color = color;
            document.getElementById('rep-grade-number').style.color = color;
            document.getElementById('rep-obs').innerText = obs;

            const body = document.getElementById('error-body');
            body.innerHTML = "";
            logs.forEach(item => {
                body.innerHTML += `<tr><td>${item.q}</td><td style="color:${item.ok ? '#2e7d32':'#c62828'}">${item.user}</td><td style="color:#2e7d32">${item.correct}</td></tr>`;
            });
        }

        async function exportPDF() {
            try {
                const { jsPDF } = window.jspdf;
                const element = document.getElementById('pdf-content');
                const canvas = await html2canvas(element, { 
                    scale: 2,
                    useCORS: true,
                    logging: false,
                    backgroundColor: "#ffffff"
                });
                const imgData = canvas.toDataURL('image/png');
                const doc = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                doc.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);
                doc.save(`Informe_Orbita_${document.getElementById('player-name').value || 'Piloto'}.pdf`);
            } catch (error) {
                console.error("Error al generar el PDF:", error);
            }
        }
    </script>
</body>
</html>
