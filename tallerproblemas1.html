<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taller de Problemas 1º | Carlos Garrido</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF9800; /* Naranja alegre para 1º */
            --primary-dark: #F57C00;
            --accent: #4FC3F7;
            --success: #8BC34A;
            --error: #FF5252;
            --bg-color: #FFF3E0;
            --card-bg: #FFFFFF;
            --text-main: #3E2723;
            --keyword-color: #E91E63; 
        }

        body {
            font-family: 'Varela Round', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#FFCC80 2px, transparent 2px);
            background-size: 30px 30px;
            margin: 0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-main);
        }

        #game-card {
            background: var(--card-bg); width: 95%; max-width: 950px; height: 95vh; max-height: 850px;
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; overflow: hidden; position: relative;
            border: 4px solid #fff;
        }

        /* HEADER */
        .header-bar {
            background: var(--primary); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
            color: white; height: 60px;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        
        .home-btn { 
            background: rgba(255,255,255,0.2); border: none; font-size: 1.5rem; cursor: pointer; 
            padding: 8px 12px; border-radius: 10px; transition: 0.2s; color: white; display: flex; align-items: center; justify-content: center;
        }
        .home-btn:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
        
        .game-title-small { font-family: 'Fredoka One'; font-size: 1.2rem; margin: 0; letter-spacing: 1px; }
        .level-badge { background: var(--accent); color: #01579B; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        
        /* TIMER */
        .timer-container { 
            font-size: 1.3rem; font-family: 'Fredoka One'; background: rgba(0,0,0,0.2); 
            padding: 5px 15px; border-radius: 20px; display: flex; align-items: center; gap: 5px;
        }

        /* PANTALLA DE INICIO (MENU) */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #FFF3E0 0%, #FFFFFF 100%);
            z-index: 300;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px; box-sizing: border-box; overflow-y: auto;
        }

        .main-title { font-family: 'Fredoka One'; font-size: 3.5rem; color: var(--primary); margin: 0; text-align: center; text-shadow: 4px 4px 0px #FFE0B2; }
        
        .sub-title-container { text-align: center; margin-bottom: 30px; }
        .sub-title-1 { font-family: 'Varela Round'; font-size: 1.8rem; color: #5D4037; margin: 5px 0; font-weight: bold; }
        .sub-title-innovamat { font-family: 'Varela Round'; font-size: 1.1rem; color: #7986CB; margin-bottom: 15px; font-style: italic; }
        .author-text { font-family: 'Varela Round'; font-size: 1.1rem; color: #90A4AE; margin-top: 5px; }
        .version-text { font-family: 'Varela Round'; font-size: 0.9rem; color: #B0BEC5; margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }

        .levels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px; width: 100%; max-width: 800px;
        }

        .level-btn {
            background: white; border: 3px solid #FFE0B2; border-radius: 20px;
            padding: 15px; text-align: center; cursor: pointer;
            transition: all 0.2s; box-shadow: 0 8px 0 #FFE0B2;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .level-btn:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 12px 0 rgba(255, 152, 0, 0.2); }
        .level-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(255, 152, 0, 0.2); }
        
        .lvl-num { font-family: 'Fredoka One'; font-size: 1.2rem; color: var(--primary); background: #FFF3E0; padding: 2px 10px; border-radius: 10px; }
        .lvl-icon { font-size: 2.5rem; }
        .lvl-desc { font-size: 0.8rem; color: #78909C; font-weight: bold; line-height: 1.2; }

        /* MAIN CONTENT */
        .main-stage {
            flex: 1; display: flex; flex-direction: column; 
            padding: 20px; overflow-y: auto; gap: 20px;
            background: linear-gradient(to bottom, #fff, #FFFDE7);
            align-items: center;
        }

        .problem-card {
            background: #E1F5FE; border: 2px dashed #4FC3F7; border-radius: 15px; padding: 20px;
            display: flex; gap: 20px; align-items: flex-start; width: 90%; max-width: 800px;
        }
        .p-icon { font-size: 3rem; background: white; padding: 10px; border-radius: 50%; box-shadow: 0 4px 0 rgba(0,0,0,0.1); }
        .p-text { font-size: 1.3rem; line-height: 1.6; flex: 1; color: #37474F; }
        .highlight { color: #0277BD; font-weight: bold; background: #B3E5FC; padding: 2px 6px; border-radius: 4px; }
        
        .keyword { 
            color: var(--keyword-color); font-weight: bold; 
            border-bottom: 2px dashed var(--keyword-color); cursor: help;
        }

        .hint-box {
            background: #FFF8E1; border-left: 5px solid var(--accent); padding: 15px;
            border-radius: 5px; margin-bottom: 10px; width: 90%; max-width: 800px;
            display: none; animation: slideDown 0.3s ease-out;
            font-style: italic; color: #5D4037; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .hint-box.visible { display: block; }

        .workspace {
            display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; align-items: flex-start;
            padding: 10px; width: 100%;
        }

        .operation-container {
            background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #EEEEEE;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .op-label { display: none; } 

        .vertical-grid {
            display: inline-grid; gap: 5px 5px; justify-content: center; align-items: center;
        }
        
        .header-cell {
            font-family: 'Fredoka One'; font-size: 1.5rem; text-align: center;
            height: 30px; line-height: 30px; margin-bottom: 5px;
        }
        .header-um { color: #FF9800; }
        .header-c { color: #4CAF50; }
        .header-d { color: #D50000; }
        .header-u { color: #2962FF; }
        .header-empty { color: transparent; }

        .cell-input {
            width: 50px; height: 50px; font-family: 'Fredoka One'; font-size: 1.8rem;
            text-align: center; border: 2px solid #CFD8DC; border-radius: 8px;
            background: #FAFAFA; color: var(--text-main); outline: none; transition: 0.2s;
        }
        
        .cell-input.operator-input {
            width: 40px; height: 40px; border-radius: 50%; 
            background: #FFF3E0; border-color: #FFB74D; color: #E65100; font-size: 1.5rem;
        }

        .cell-input.carry {
            height: 35px; font-size: 1.2rem; border: 2px dashed #4DB6AC; background: #E0F2F1; margin-bottom: -5px;
        }

        .cell-input:focus { border-color: var(--primary); background: #fff; transform: scale(1.1); z-index: 2; }
        .cell-input.no-border { border: none; background: transparent; font-size: 2rem; color: var(--primary); line-height: 50px; }
        
        .cell-input.line { 
            grid-column: 1 / -1; height: 4px; background: #37474F; 
            border: none; margin: 0; border-radius: 2px; width: 100%; 
        }
        
        .cell-input.correct { background: #C8E6C9; border-color: #4CAF50; color: #2E7D32; }
        .cell-input.incorrect { background: #FFCDD2; border-color: #F44336; animation: shake 0.4s; }

        /* SENTENCE ANSWER SECTION */
        .sentence-answer-container {
            width: 90%; max-width: 800px; margin-top: 15px;
            background: #FAFAFA; padding: 15px 25px; border-radius: 15px; border: 2px solid #E0E0E0;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px;
            font-size: 1.3rem; color: #37474F; font-weight: bold;
        }
        .final-input {
            width: 100px; padding: 5px 10px; font-size: 1.3rem; border: 3px solid #90A4AE; border-radius: 10px;
            font-family: 'Fredoka One'; text-align: center; color: var(--primary);
        }
        .final-input:focus { border-color: var(--primary); outline: none; background: #E8EAF6; }
        .final-input.correct { border-color: var(--success); background-color: #E8F5E9; color: #2E7D32; }
        .final-input.incorrect { border-color: var(--error); background-color: #FFEBEE; }

        .controls { 
            margin-top: auto; display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 20px; background: #FFF; border-top: 1px solid #EEE;
        }
        .controls-left { display: flex; gap: 10px; align-items: center; }
        
        .btn {
            border: none; padding: 12px 30px; border-radius: 30px; 
            font-family: 'Fredoka One'; font-size: 1.1rem; cursor: pointer; 
            box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: transform 0.1s;
            display: flex; align-items: center; gap: 10px;
        }
        .btn-check { background: var(--success); color: white; }
        .btn-hint { background: var(--accent); color: #01579B; }
        .btn-back-game { background: #78909C; color: white; padding: 10px 15px; font-size: 1rem; }
        .btn-next { background: var(--primary); color: white; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .hidden { display: none !important; }

        .feedback-msg { font-weight: bold; font-size: 1.2rem; margin-right: 20px; }

        /* OVERLAYS */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98); z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .big-emoji { font-size: 5rem; animation: bounce 1s infinite; margin-bottom: 20px; }
        
        /* FEEDBACK REPORT */
        .feedback-report {
            background: white; padding: 30px; border-radius: 20px; width: 80%; max-width: 600px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: left;
        }
        .report-title { font-family: 'Fredoka One'; color: var(--primary); font-size: 2rem; margin-bottom: 20px; text-align: center; }
        .feedback-list { list-style: none; padding: 0; }
        .feedback-item { margin-bottom: 15px; font-size: 1.1rem; padding: 10px; border-radius: 10px; display: flex; align-items: flex-start; gap: 10px; }
        .fb-icon { font-size: 1.5rem; }
        .fb-good { background: #E8F5E9; color: #2E7D32; border-left: 5px solid #4CAF50; }
        .fb-info { background: #E3F2FD; color: #1565C0; border-left: 5px solid #2196F3; }
        .fb-warn { background: #FFF3E0; color: #EF6C00; border-left: 5px solid #FF9800; }

        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        @keyframes slideDown { from {opacity:0; transform:translateY(-10px);} to {opacity:1; transform:translateY(0);} }
        @keyframes bounce { 0%, 100% {transform: translateY(0);} 50% {transform: translateY(-10px);} }
        #confetti-canvas { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:90; }

    </style>
</head>
<body>

    <div id="game-card">
        <canvas id="confetti-canvas"></canvas>

        <!-- PANTALLA DE INICIO -->
        <div id="start-screen">
            <h1 class="main-title">Taller de Problemas</h1>
            <div class="sub-title-container">
                <div class="sub-title-1">1º de Primaria</div>
                <div class="sub-title-innovamat">Basado en la tipología de problemas Innovamat</div>
                <div class="author-text">Elaborado por Carlos Garrido</div>
                <div class="version-text">Versión 1.0</div>
            </div>
            
            <div class="levels-grid" id="levels-grid">
                <!-- Se generan con JS -->
            </div>
        </div>

        <div class="header-bar">
            <div class="header-left">
                <!-- Botón Home Superior -->
                <button class="home-btn" onclick="showStartScreen()" title="Volver al Menú">🏠</button>
                <div style="display:flex; flex-direction:column;">
                    <span class="game-title-small">Taller de Problemas</span>
                    <span style="font-size:0.7rem; opacity:0.8;">Operaciones y Algoritmos</span>
                </div>
            </div>
            <div class="level-badge" id="level-indicator">NIVEL 1</div>
            <!-- TEMPORIZADOR -->
            <div class="timer-container">
                <span>⏱️</span> <span id="time-display">00:00</span>
            </div>
        </div>

        <div class="main-stage" id="stage">
            <div id="hint-display" class="hint-box"></div>
            
            <div class="problem-card" id="problem-card">
                <div class="p-icon" id="p-icon"></div>
                <div class="p-text" id="p-text"></div>
            </div>

            <div class="workspace" id="workspace"></div>
            
            <!-- CONTENEDOR DE RESPUESTA FINAL -->
            <div id="final-answer-zone"></div>
        </div>

        <div class="controls">
            <div class="controls-left">
                <button class="btn btn-hint" onclick="toggleHint()">💡 PISTA</button>
            </div>
            <div class="feedback-msg" id="feedback"></div>
            <button class="btn btn-check" id="btn-action" onclick="checkAnswers()">COMPROBAR ✅</button>
        </div>

        <!-- PANTALLA INFORME FINAL -->
        <div id="screen-report" class="overlay hidden">
            <div class="feedback-report">
                <h2 class="report-title">¡Nivel Completado!</h2>
                <div class="feedback-list" id="feedback-list-content">
                    <!-- Feedback Dinámico -->
                </div>
                <div style="text-align:center; margin-top:20px;">
                    <button class="btn btn-next" onclick="showStartScreen()" style="margin:0 auto;">VOLVER AL MENÚ</button>
                </div>
            </div>
        </div>
        
    </div>

    <script>
        // PROBLEMAS ANÁLOGOS 1º PRIMARIA
        const levels = [
            // FICHA 1
            { title: "Nivel 1", desc: "Fruta y Pájaros", icon: "🍎", problems: [
                { text: "En un cesto hay 4 manzanas. Mi madre pone 1 manzana más en el cesto. ¿Cuántas manzanas hay ahora <span class='keyword'>en total</span>?", 
                  pre: "Hay", suf: "manzanas.", solution: 5,
                  ops: [{ type: "add", cols: 2, structure: [[null, 4], ["+", 1], ["line"], [null, 5]], hint: "Junta las que había con la nueva." }], icon: "🧺" },
                { text: "En un cable había 7 pájaros. De repente, 2 pájaros han salido volando. ¿Cuántos pájaros <span class='keyword'>quedan</span> en el cable?", 
                  pre: "Quedan", suf: "pájaros.", solution: 5,
                  ops: [{ type: "sub", cols: 2, structure: [[null, 7], ["-", 2], ["line"], [null, 5]], hint: "Si se van, tienes que quitar (restar)." }], icon: "🐦" }
            ]},
            // FICHA 2
            { title: "Nivel 2", desc: "Coches y Pasteles", icon: "🚗", problems: [
                { text: "En una caja tengo 8 coches rojos, 1 coche azul y 4 coches verdes. ¿Cuántos coches tengo <span class='keyword'>en total</span>?", 
                  pre: "Tengo", suf: "coches.", solution: 13,
                  // Suma de 3 sumandos
                  ops: [{ type: "add", cols: 3, structure: [[null, "", 8], ["+", "", 1], ["+", "", 4], ["line"], [null, 1, 3]], hint: "Suma todos los grupos de coches." }], icon: "🏎️" },
                { text: "He horneado 13 magdalenas. Mi hermano se ha comido 6 magdalenas. ¿Cuántas magdalenas <span class='keyword'>quedan</span>?", 
                  pre: "Quedan", suf: "magdalenas.", solution: 7,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 3], ["-", "", 6], ["line"], [null, "", 7]], hint: "Resta las que se ha comido al total." }], icon: "🧁" }
            ]},
            // FICHA 3
            { title: "Nivel 3", desc: "Juguetes y Lápices", icon: "🧸", problems: [
                { text: "En una caja de juguetes quedan 14 muñecos. Antes había más, pero saqué 3 para jugar. ¿Cuántos muñecos había <span class='keyword'>al principio</span> en la caja?", 
                  pre: "Había", suf: "muñecos.", solution: 17,
                  ops: [{ type: "add", cols: 3, structure: [[null, 1, 4], ["+", "", 3], ["line"], [null, 1, 7]], hint: "Junta los que quedan con los que sacaste." }], icon: "📦" },
                { text: "Tengo 3 lápices en mi estuche. Compro un paquete de 6 lápices y los meto dentro. ¿Cuántos lápices tengo ahora <span class='keyword'>en total</span>?", 
                  pre: "Tengo", suf: "lápices.", solution: 9,
                  ops: [{ type: "add", cols: 2, structure: [[null, 3], ["+", 6], ["line"], [null, 9]], hint: "Suma los que tenías y los nuevos." }], icon: "✏️" }
            ]},
            // FICHA 4
            { title: "Nivel 4", desc: "Dinero y Clase", icon: "💶", problems: [
                { text: "Tenía dinero en mi hucha. He gastado 3 euros y ahora me quedan 23 euros. ¿Cuánto dinero tenía <span class='keyword'>antes</span> de gastar nada?", 
                  pre: "Tenía", suf: "euros.", solution: 26,
                  ops: [{ type: "add", cols: 3, structure: [[null, 2, 3], ["+", "", 3], ["line"], [null, 2, 6]], hint: "Suma lo que te queda y lo que gastaste." }], icon: "💰" },
                { text: "En mi clase somos 17 alumnos. 6 alumnos están en el pasillo. ¿Cuántos alumnos hay <span class='keyword'>dentro</span> de la clase?", 
                  pre: "Hay", suf: "alumnos.", solution: 11,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 7], ["-", "", 6], ["line"], [null, 1, 1]], hint: "Resta los que están fuera al total de la clase." }], icon: "🏫" }
            ]},
            // FICHA 5
            { title: "Nivel 5", desc: "Pegatinas y Monedas", icon: "⭐", problems: [
                { text: "Tenía 9 pegatinas en mi álbum. Mi abuela me ha regalado algunas más y ahora tengo 17. ¿Cuántas pegatinas <span class='keyword'>nuevas</span> me ha regalado?", 
                  pre: "Me regaló", suf: "pegatinas.", solution: 8,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 7], ["-", "", 9], ["line"], [null, "", 8]], hint: "Busca la diferencia entre las que tienes ahora y las que tenías." }], icon: "📒" },
                { text: "Tenía algunas monedas en el bolsillo. Me he encontrado 7 monedas más y ahora tengo 13 monedas en total. ¿Cuántas monedas tenía <span class='keyword'>antes</span>?", 
                  pre: "Tenía", suf: "monedas.", solution: 6,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 3], ["-", "", 7], ["line"], [null, "", 6]], hint: "Resta las que encontraste al total." }], icon: "🪙" }
            ]},
            // FICHA 6
            { title: "Nivel 6", desc: "Canicas y Globos", icon: "🔮", problems: [
                { text: "Tengo 5 canicas rojas, 7 canicas azules y 6 canicas verdes. ¿Cuántas canicas tengo <span class='keyword'>en total</span>?", 
                  pre: "Tengo", suf: "canicas.", solution: 18,
                  ops: [{ type: "add", cols: 3, structure: [[null, "", 5], ["+", "", 7], ["+", "", 6], ["line"], [null, 1, 8]], hint: "Suma todas las canicas de todos los colores." }], icon: "🔮" },
                { text: "Había 18 globos en la fiesta. Algunos se han pinchado y ahora solo quedan 5 globos. ¿Cuántos globos se han <span class='keyword'>pinchado</span>?", 
                  pre: "Pinchados:", suf: "globos.", solution: 13,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 8], ["-", "", 5], ["line"], [null, 1, 3]], hint: "Resta los que quedan a los que había al principio." }], icon: "🎈" }
            ]},
            // FICHA 7
            { title: "Nivel 7", desc: "Torres y Libros", icon: "🧱", problems: [
                { text: "He hecho una torre con 10 bloques. Mi torre tiene 4 bloques <span class='keyword'>más</span> que la torre de Luis. ¿Cuántos bloques tiene la torre de Luis?", 
                  pre: "Tiene", suf: "bloques.", solution: 6,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 0], ["-", "", 4], ["line"], [null, "", 6]], hint: "Si la tuya es más grande, la de Luis es más pequeña. Resta la diferencia." }], icon: "🏰" },
                { text: "En la estantería había 9 libros. He puesto algunos libros nuevos y ahora hay 12. ¿Cuántos libros <span class='keyword'>nuevos</span> he puesto?", 
                  pre: "He puesto", suf: "libros.", solution: 3,
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 2], ["-", "", 9], ["line"], [null, "", 3]], hint: "Busca la diferencia entre los que hay ahora y los que había." }], icon: "📚" }
            ]},
            // FICHA 8
            { title: "Nivel 8", desc: "Frutas y Autobús", icon: "🍌", problems: [
                { text: "En un frutero hay 12 piezas de fruta. Hay 2 plátanos, 4 peras y el resto son naranjas. ¿Cuántas <span class='keyword'>naranjas</span> hay?", 
                  pre: "Hay", suf: "naranjas.", solution: 6,
                  // Dos pasos: 2+4=6, 12-6=6. O resta sucesiva. Usamos resta directa de la suma de conocidos.
                  // Simplificamos para 1º: 12 - 6 (que son los platanos y peras juntos)
                  ops: [{ type: "sub", cols: 3, structure: [[null, 1, 2], ["-", "", 6], ["line"], [null, "", 6]], hint: "Primero junta los plátanos y las peras (son 6), luego quítalos del total." }], icon: "🍊" },
                { text: "En el autobús van algunos pasajeros. En la parada bajan 5 personas y quedan 17 dentro. ¿Cuántas personas había <span class='keyword'>antes</span> de la parada?", 
                  pre: "Había", suf: "personas.", solution: 22,
                  ops: [{ type: "add", cols: 3, structure: [[null, 1, 7], ["+", "", 5], ["line"], [null, 2, 2]], hint: "Suma los que se bajaron y los que quedan dentro." }], icon: "🚌" }
            ]}
        ];

        let currentLevelIdx = 0;
        let currentProblemIdx = 0;
        let errorsCount = 0;
        let startTime = null;
        let timerInterval = null;
        let questionStartTimes = [];

        window.onload = function() {
            generateStartScreen();
        };

        function generateStartScreen() {
            const grid = document.getElementById('levels-grid');
            grid.innerHTML = "";
            levels.forEach((lvl, idx) => {
                const btn = document.createElement('div');
                btn.className = 'level-btn';
                btn.onclick = () => selectLevel(idx);
                btn.innerHTML = `
                    <div class="lvl-num">Ficha ${idx + 1}</div>
                    <div class="lvl-icon">${lvl.icon}</div>
                    <div class="lvl-desc">${lvl.desc}</div>
                `;
                grid.appendChild(btn);
            });
        }

        function showStartScreen() {
            stopTimer();
            ['screen-win', 'screen-report', 'screen-gameover'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.add('hidden');
            });
            const start = document.getElementById('start-screen');
            if(start) {
                start.classList.remove('hidden');
                start.style.display = 'flex';
            }
            const canvas = document.getElementById('confetti-canvas');
            if(canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0,0,canvas.width,canvas.height);
            }
        }

        function selectLevel(idx) {
            currentLevelIdx = idx;
            currentProblemIdx = 0;
            errorsCount = 0;
            questionStartTimes = [];
            startTimer();
            questionStartTimes[0] = Date.now();
            document.getElementById('start-screen').style.display = 'none';
            loadLevel();
        }

        function startTimer() {
            startTime = Date.now();
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimerUI, 1000);
        }

        function stopTimer() {
            if(timerInterval) clearInterval(timerInterval);
        }

        function updateTimerUI() {
            const delta = Date.now() - startTime;
            const seconds = Math.floor((delta / 1000) % 60);
            const minutes = Math.floor((delta / 1000 / 60));
            document.getElementById('time-display').innerText = 
                `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }

        function loadLevel() {
            const level = levels[currentLevelIdx];
            const prob = level.problems[currentProblemIdx];
            
            if (!questionStartTimes[currentProblemIdx]) {
                questionStartTimes[currentProblemIdx] = Date.now();
            }

            document.getElementById('level-indicator').innerText = `NIVEL ${currentLevelIdx + 1} (${currentProblemIdx + 1}/2)`;
            document.getElementById('p-icon').innerText = prob.icon;
            document.getElementById('p-text').innerHTML = prob.text;
            
            document.getElementById('hint-display').classList.remove('visible');
            document.getElementById('feedback').innerText = "";
            const btn = document.getElementById('btn-action');
            btn.innerText = "COMPROBAR ✅";
            btn.className = "btn btn-check";
            btn.onclick = checkAnswers;

            const workspace = document.getElementById('workspace');
            workspace.innerHTML = "";

            prob.ops.forEach((op, opIdx) => {
                const container = document.createElement('div');
                container.className = 'operation-container';

                const cols = op.cols || 3;
                const gridData = op.structure;
                
                const grid = document.createElement('div');
                grid.className = 'vertical-grid';
                grid.style.gridTemplateColumns = `repeat(${cols}, 50px)`;

                for(let i=0; i<cols; i++) {
                    const hCell = document.createElement('div');
                    hCell.className = 'header-cell';
                    const posFromEnd = cols - 1 - i; 
                    if(posFromEnd === 0) { hCell.innerText = "U"; hCell.classList.add('header-u'); }
                    else if(posFromEnd === 1) { hCell.innerText = "D"; hCell.classList.add('header-d'); }
                    else if(posFromEnd === 2) { hCell.innerText = "C"; hCell.classList.add('header-c'); }
                    else { hCell.innerText = ""; hCell.classList.add('header-empty'); }
                    grid.appendChild(hCell);
                }

                gridData.forEach((row, rIdx) => {
                    if (row.length === 1 && row[0] === 'line') {
                        const line = document.createElement('div');
                        line.className = 'cell-input line';
                        grid.appendChild(line);
                        return;
                    }

                    row.forEach((cellVal, cIdx) => {
                        const input = document.createElement('input');
                        input.type = "text"; 
                        input.dataset.op = opIdx;
                        input.dataset.row = rIdx;
                        input.dataset.col = cIdx;
                        
                        if (cellVal === null) {
                            input.className = "cell-input no-border";
                            input.style.opacity = "0";
                            input.disabled = true;
                        } else if (cellVal === "+" || cellVal === "-" || cellVal === "x") {
                            input.className = "cell-input operator-input";
                            input.placeholder = "?";
                        } else {
                            input.className = "cell-input";
                            if (rIdx === 0 && op.structure[0].includes(null) && cellVal !== null) {
                                    input.classList.add('carry');
                            }
                        }
                        grid.appendChild(input);
                    });
                });
                container.appendChild(grid);
                workspace.appendChild(container);
            });

            const finalZone = document.getElementById('final-answer-zone');
            finalZone.innerHTML = '';

            const ansContainer = document.createElement('div');
            ansContainer.className = 'sentence-answer-container';
            ansContainer.innerHTML = `
                <span>${prob.pre}</span>
                <input type="number" id="final-input" class="final-input" placeholder="?">
                <span>${prob.suf}</span>
            `;
            finalZone.appendChild(ansContainer);
        }

        function toggleHint() {
            const level = levels[currentLevelIdx];
            const prob = level.problems[currentProblemIdx];
            const hintBox = document.getElementById('hint-display');
            let hints = prob.ops.map(o => o.hint).filter(h => h).join(" <br> ");
            if (!hints) hints = "Lee atentamente los datos resaltados.";
            if (hintBox.classList.contains('visible')) {
                hintBox.classList.remove('visible');
            } else {
                hintBox.innerHTML = "💡 " + hints;
                hintBox.classList.add('visible');
            }
        }

        function checkAnswers() {
            const level = levels[currentLevelIdx];
            const prob = level.problems[currentProblemIdx];
            const inputs = document.querySelectorAll('input.cell-input:not(:disabled), input.operator-input');
            let allCorrect = true;

            inputs.forEach(inp => inp.classList.remove('correct', 'incorrect'));

            const sumOpsInputs = {}; 

            inputs.forEach(inp => {
                const opIdx = inp.dataset.op;
                const opData = prob.ops[opIdx];
                let expected = "";

                const r = parseInt(inp.dataset.row);
                const c = parseInt(inp.dataset.col);
                expected = opData.structure[r][c];

                if (opData.type === 'add') {
                    if (!sumOpsInputs[opIdx]) sumOpsInputs[opIdx] = { rows: {}, operatorInput: null, resultInputs: [] };
                    
                    // Simple logic for 3 addends or 2 addends
                    // We simply check against expected value. 
                    // Advanced commutative logic for >2 addends is complex to implement generically without strict structure
                    // For 1st grade, we assume direct mapping usually, but let's keep the loose validation
                    
                    if (typeof expected === "string" && (expected === "+")) {
                         if (inp.value === "+") inp.classList.add('correct');
                         else { inp.classList.add('incorrect'); allCorrect = false; }
                    } else {
                         if (inp.value === "" || parseInt(inp.value) === 0) {
                             if(expected === "" || expected === undefined || expected === null) inp.classList.add('correct');
                             // If user put nothing where a number was expected, it's error unless it's a leading zero case
                             else if(expected === 0) inp.classList.add('correct');
                             else { inp.classList.add('incorrect'); allCorrect = false; }
                         } else {
                             if (parseInt(inp.value) === expected) inp.classList.add('correct');
                             else { inp.classList.add('incorrect'); allCorrect = false; }
                         }
                    }

                } else {
                    if (typeof expected === "string" && (expected === "-" || expected === "x")) {
                        if (inp.value.toLowerCase() === expected.toLowerCase()) inp.classList.add('correct');
                        else { inp.classList.add('incorrect'); allCorrect = false; }
                    } else {
                        if (expected === "" || expected === undefined) {
                                if (inp.value === "" || parseInt(inp.value) === 0) inp.classList.add('correct');
                                else { inp.classList.add('incorrect'); allCorrect = false; }
                        } else {
                            if (parseInt(inp.value) === expected) inp.classList.add('correct');
                            else { inp.classList.add('incorrect'); allCorrect = false; }
                        }
                    }
                }
            });

            const finalInput = document.getElementById('final-input');
            if (finalInput) {
                if (parseInt(finalInput.value) === prob.solution) {
                    finalInput.classList.remove('incorrect');
                    finalInput.classList.add('correct');
                } else {
                    finalInput.classList.remove('correct');
                    finalInput.classList.add('incorrect');
                    allCorrect = false;
                }
            }

            const feedback = document.getElementById('feedback');
            if (allCorrect) {
                playSound('correct');
                feedback.innerText = "¡Correcto!";
                feedback.style.color = "var(--success)";
                
                const now = Date.now();
                const start = questionStartTimes[currentProblemIdx];
                const elapsed = Math.floor((now - start) / 1000);
                if(!level.times) level.times = [];
                level.times[currentProblemIdx] = elapsed;

                const btn = document.getElementById('btn-action');
                btn.innerText = "SIGUIENTE ➜";
                btn.className = "btn btn-next";
                btn.onclick = nextProblem;
            } else {
                errorsCount++; 
                playSound('error');
                feedback.innerText = "Revisa los datos rojos";
                feedback.style.color = "var(--error)";
            }
        }

        function nextProblem() {
            currentProblemIdx++;
            if (currentProblemIdx >= 2) {
                currentProblemIdx = 0;
                stopTimer();
                fireConfetti();
                showReportScreen(); 
            } else {
                loadLevel();
            }
        }

        function showReportScreen() {
            const reportScreen = document.getElementById('screen-report');
            const list = document.getElementById('feedback-list-content');
            list.innerHTML = "";

            const level = levels[currentLevelIdx];
            const times = level.times || [0, 0];
            const timeSpent = (Date.now() - startTime) / 1000; 
            let feedbackItems = [];

            feedbackItems.push({type: 'info', icon: '⏱️', text: `Pregunta 1: ${times[0]} seg. | Pregunta 2: ${times[1]} seg.`});

            if (errorsCount === 0) {
                feedbackItems.push({type: 'good', icon: '⭐', text: "¡Fantástico! Todo a la primera."});
            } else if (errorsCount <= 3) {
                feedbackItems.push({type: 'info', icon: '👀', text: "Muy bien, sigue practicando así."});
            } else {
                feedbackItems.push({type: 'warn', icon: '🛑', text: "Lee despacio y fíjate en los números."});
            }

            feedbackItems.forEach(item => {
                const li = document.createElement('li');
                li.className = `feedback-item fb-${item.type}`;
                li.innerHTML = `<span class="fb-icon">${item.icon}</span> <span>${item.text}</span>`;
                list.appendChild(li);
            });

            reportScreen.classList.remove('hidden');
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            if (type === 'correct') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
            } else {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            }
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function fireConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = document.getElementById('game-card').offsetWidth;
            canvas.height = document.getElementById('game-card').offsetHeight;
            const colors = ['#FF9800','#4FC3F7','#8BC34A', '#E91E63'];
            let particles = [];
            for(let i=0; i<150; i++) particles.push({
                x: canvas.width/2, y: canvas.height/2,
                vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12,
                color: colors[Math.floor(Math.random()*4)], size: Math.random()*6+2
            });
            function update() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; ctx.fillStyle=p.color; ctx.fillRect(p.x,p.y,p.size,p.size); });
                requestAnimationFrame(update);
            }
            update();
        }
    </script>
